openapi: 3.1.0
info:
  title: TeamClaw Cloud API
  version: 1.0.0
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
servers:
  - url: https://api.teamclaw.local
security:
  - bearerAuth: []
tags:
  - name: Teams
    description: Team membership and team metadata.
  - name: Sessions
    description: Conversation session list and detail surfaces.
  - name: Messages
    description: Session message read and write operations.
  - name: Invites
    description: Team invite claim operations.
  - name: Workspaces
    description: Workspace CRUD operations.
  - name: Actors
    description: Actor directory and agent access management.
  - name: Notifications
    description: Notification preferences and session mute management.
  - name: Shortcuts
    description: Shortcut management and visibility control.
paths:
  /v1/auth/refresh:
    post:
      operationId: refreshAccessToken
      summary: Exchange a refresh token for a new access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        "200":
          description: New token pair
          content:
            application/json:
              schema:
                type: object
                required: [accessToken, refreshToken, expiresAt]
                properties:
                  accessToken:
                    type: string
                  refreshToken:
                    type: string
                  expiresAt:
                    type: integer
                    format: int64
        "401":
          $ref: "#/components/responses/Error"
  /v1/teams:
    get:
      operationId: listTeams
      summary: List teams
      tags: [Teams]
      responses:
        "200":
          description: Current user's teams.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                type: object
                required: [items, nextCursor]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Team"
                  nextCursor:
                    type:
                      - string
                      - "null"
        "401":
          $ref: "#/components/responses/Error"
    post:
      operationId: createTeam
      summary: Create team
      tags: [Teams]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  minLength: 1
                slug:
                  type:
                    - string
                    - "null"
      responses:
        "200":
          description: Created team.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /v1/teams/{teamId}:
    get:
      operationId: getTeam
      summary: Get team
      tags: [Teams]
      parameters:
        - $ref: "#/components/parameters/TeamId"
      responses:
        "200":
          description: Team.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"
        "404":
          $ref: "#/components/responses/Error"
    patch:
      operationId: renameTeam
      summary: Rename team
      tags: [Teams]
      parameters:
        - $ref: "#/components/parameters/TeamId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  minLength: 1
      responses:
        "200":
          description: Renamed team.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /v1/teams/{teamId}/invites:
    post:
      operationId: createTeamInvite
      summary: Create team invite
      tags: [Teams]
      parameters:
        - $ref: "#/components/parameters/TeamId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [actorType, displayName]
              properties:
                actorType:
                  type: string
                  enum: [agent, user, external]
                displayName:
                  type: string
                  minLength: 1
                role:
                  type: string
                expiresAt:
                  type:
                    - string
                    - "null"
                  format: date-time
      responses:
        "201":
          description: Created invite.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                type: object
                required: [token, inviteId, expiresAt]
                properties:
                  token:
                    type: string
                  inviteId:
                    type: string
                    format: uuid
                  expiresAt:
                    type:
                      - string
                      - "null"
                    format: date-time
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /v1/teams/{teamId}/members/{actorId}:
    delete:
      operationId: removeTeamActor
      summary: Remove team actor
      tags: [Teams]
      parameters:
        - $ref: "#/components/parameters/TeamId"
        - name: actorId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: OK
        "401":
          $ref: "#/components/responses/Error"
  /v1/sessions:
    get:
      operationId: listSessions
      summary: List sessions
      tags: [Sessions]
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Current actor sessions.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                type: object
                required: [items, nextCursor]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Session"
                  nextCursor:
                    type:
                      - string
                      - "null"
        "401":
          $ref: "#/components/responses/Error"
    post:
      operationId: createSession
      summary: Create session
      tags: [Sessions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionCreate"
      responses:
        "201":
          description: Created session with participants.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionWithParticipants"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /v1/sessions/{sessionId}:
    get:
      operationId: getSession
      summary: Get session with participants
      tags: [Sessions]
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Session with participants.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionWithParticipants"
        "404":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
    patch:
      operationId: patchSession
      summary: Update session
      tags: [Sessions]
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                mode:
                  type: string
                  enum: [solo, collab, control]
                ideaId:
                  type:
                    - string
                    - "null"
                  format: uuid
                archived:
                  type: boolean
      responses:
        "200":
          description: Updated session.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /v1/sessions/{sessionId}/mark-viewed:
    post:
      operationId: markSessionViewed
      summary: Mark session viewed
      tags: [Sessions]
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "204":
          description: OK
        "401":
          $ref: "#/components/responses/Error"
  /v1/sessions/{sessionId}/participants:
    get:
      operationId: listSessionParticipants
      summary: List session participants
      tags: [Sessions]
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Session participants.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionParticipantList"
        "401":
          $ref: "#/components/responses/Error"
    post:
      operationId: upsertSessionParticipant
      summary: Add or update session participant
      tags: [Sessions]
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [actorId]
              properties:
                actorId:
                  type: string
                  format: uuid
                role:
                  type: string
      responses:
        "200":
          description: Upserted participant.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionParticipant"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /v1/sessions/{sessionId}/participants/{actorId}:
    delete:
      operationId: removeSessionParticipant
      summary: Remove session participant
      tags: [Sessions]
      parameters:
        - $ref: "#/components/parameters/SessionId"
        - name: actorId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: OK
        "401":
          $ref: "#/components/responses/Error"
  /v1/sessions/by-acp/{acpSessionId}:
    get:
      operationId: getSessionByAcp
      summary: Get session by ACP session ID
      tags: [Sessions]
      parameters:
        - name: acpSessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session ACP binding.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                type: object
                required: [sessionId]
                properties:
                  sessionId:
                    type: string
                    format: uuid
                  gatewaySessionId:
                    type:
                      - string
                      - "null"
        "404":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /v1/sessions/gateway/ensure:
    post:
      operationId: ensureGatewaySession
      summary: Ensure gateway session
      tags: [Sessions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [teamId, binding, title, primaryAgentActorId]
              properties:
                teamId:
                  type: string
                  format: uuid
                binding:
                  type: string
                title:
                  type: string
                primaryAgentActorId:
                  type: string
                  format: uuid
                ownerMemberActorIds:
                  type: array
                  items:
                    type: string
                    format: uuid
                participantActorIds:
                  type: array
                  items:
                    type: string
                    format: uuid
      responses:
        "200":
          description: Gateway session result.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                type: object
                required: [sessionId, gatewaySessionId, created]
                properties:
                  sessionId:
                    type: string
                    format: uuid
                  gatewaySessionId:
                    type: string
                  created:
                    type: boolean
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /v1/sessions/cron:
    post:
      operationId: createCronSession
      summary: Create cron session
      tags: [Sessions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [teamId, primaryAgentActorId, title]
              properties:
                teamId:
                  type: string
                  format: uuid
                primaryAgentActorId:
                  type: string
                  format: uuid
                title:
                  type: string
      responses:
        "200":
          description: Cron session result.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                type: object
                required: [sessionId]
                properties:
                  sessionId:
                    type: string
                    format: uuid
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /v1/sessions/{sessionId}/messages:
    get:
      operationId: listMessages
      summary: List messages
      tags: [Messages]
      parameters:
        - $ref: "#/components/parameters/SessionId"
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Session messages.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                type: object
                required: [items, nextCursor]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Message"
                  nextCursor:
                    type:
                      - string
                      - "null"
        "401":
          $ref: "#/components/responses/Error"
    post:
      operationId: insertMessage
      summary: Insert message
      tags: [Messages]
      parameters:
        - $ref: "#/components/parameters/SessionId"
        - name: Idempotency-Key
          in: header
          schema:
            type: string
            minLength: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InsertMessageRequest"
      responses:
        "200":
          description: Inserted or replayed message.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "400":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
  /v1/messages/{messageId}:
    patch:
      operationId: patchMessage
      summary: Update message content or metadata
      tags: [Messages]
      parameters:
        - name: messageId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                content:
                  type: string
                metadata:
                  type:
                    - object
                    - "null"
                  additionalProperties: true
      responses:
        "200":
          description: Updated message.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
    delete:
      operationId: deleteMessage
      summary: Delete message
      tags: [Messages]
      parameters:
        - name: messageId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: OK
        "401":
          $ref: "#/components/responses/Error"
  /v1/invites/claim:
    post:
      operationId: claimInvite
      summary: Claim invite
      tags: [Invites]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
                  minLength: 1
      responses:
        "200":
          description: Claimed invite.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClaimInviteResult"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /v1/heartbeat:
    post:
      operationId: heartbeat
      summary: Daemon liveness ping (updates last_seen)
      responses:
        "204":
          description: OK
        "401":
          $ref: "#/components/responses/Error"
  /v1/workspaces:
    get:
      operationId: listWorkspaces
      summary: List workspaces by team
      tags: [Workspaces]
      parameters:
        - name: teamId
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Workspace page.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspacePage"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
    post:
      operationId: upsertWorkspace
      summary: Upsert workspace
      tags: [Workspaces]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkspaceUpsert"
      responses:
        "200":
          description: Upserted workspace.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /v1/workspaces/{workspaceId}:
    get:
      operationId: getWorkspace
      summary: Get single workspace
      tags: [Workspaces]
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Workspace.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
        "404":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
    patch:
      operationId: patchWorkspace
      summary: Update workspace name or archived status
      tags: [Workspaces]
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                archived:
                  type: boolean
                metadata:
                  type: object
                  additionalProperties: true
      responses:
        "200":
          description: Updated workspace.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /v1/teams/{teamId}/workspace-config:
    get:
      operationId: getTeamWorkspaceConfig
      summary: Get team workspace config
      tags: [Teams]
      parameters:
        - $ref: "#/components/parameters/TeamId"
      responses:
        "200":
          description: Team workspace config.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamWorkspaceConfig"
        "404":
          $ref: "#/components/responses/Error"
    put:
      operationId: putTeamWorkspaceConfig
      summary: Put team workspace config
      tags: [Teams]
      parameters:
        - $ref: "#/components/parameters/TeamId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamWorkspaceConfig"
      responses:
        "200":
          description: Upserted team workspace config.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamWorkspaceConfig"
        "400":
          $ref: "#/components/responses/Error"
  /v1/teams/{teamId}/actors:
    get:
      operationId: listTeamActors
      summary: List team actors
      tags: [Actors]
      parameters:
        - $ref: "#/components/parameters/TeamId"
        - name: kind
          in: query
          schema:
            type: string
            enum: [agent, user, external]
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 200
      responses:
        "200":
          description: Actor page.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActorPage"
        "401":
          $ref: "#/components/responses/Error"
  /v1/actors/{actorId}:
    get:
      operationId: getActor
      summary: Get single actor
      tags: [Actors]
      parameters:
        - name: actorId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Actor.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Actor"
        "404":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /v1/actors/external:
    post:
      operationId: upsertExternalActor
      summary: Upsert external actor
      tags: [Actors]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [teamId, source, sourceId, displayName]
              properties:
                teamId:
                  type: string
                  format: uuid
                source:
                  type: string
                sourceId:
                  type: string
                displayName:
                  type: string
      responses:
        "200":
          description: Upserted actor.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                type: object
                required: [actorId]
                properties:
                  actorId:
                    type: string
                    format: uuid
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /v1/teams/{teamId}/agents/connected:
    get:
      operationId: listConnectedAgents
      summary: List connected agents
      tags: [Actors]
      parameters:
        - $ref: "#/components/parameters/TeamId"
      responses:
        "200":
          description: Connected agents.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/ConnectedAgent"
        "401":
          $ref: "#/components/responses/Error"
  /v1/agents/{agentActorId}:
    patch:
      operationId: updateOwnedAgentProfile
      summary: Update owned agent profile
      tags: [Actors]
      parameters:
        - name: agentActorId
          in: path
          required: true
          schema:
            type: string
