components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  headers:
    RequestId:
      schema:
        type: string
  parameters:
    TeamId:
      name: teamId
      in: path
      required: true
      schema:
        type: string
    SessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
  responses:
    Error:
      description: Error response.
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
  schemas:
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, requestId]
          properties:
            code:
              type: string
              enum:
                - missing_auth
                - invalid_json
                - validation_failed
                - forbidden
                - not_found
                - conflict
                - rate_limited
                - upstream_unavailable
                - internal
            message:
              type: string
            requestId:
              type: string
    Team:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type:
            - string
            - "null"
        createdAt:
          type:
            - string
            - "null"
    Session:
      type: object
      required: [id, teamId, title, mode, hasUnread]
      properties:
        id:
          type: string
        teamId:
          type: string
        title:
          type: string
        mode:
          type: string
          enum: [solo, collab, control]
        ideaId:
          type:
            - string
            - "null"
        lastMessageAt:
          type:
            - string
            - "null"
        lastMessagePreview:
          type:
            - string
            - "null"
        hasUnread:
          type: boolean
        createdAt:
          type:
            - string
            - "null"
        updatedAt:
          type:
            - string
            - "null"
    Message:
      type: object
      required: [id, teamId, sessionId, kind, content, createdAt]
      properties:
        id:
          type: string
        teamId:
          type: string
        sessionId:
          type: string
        turnId:
          type:
            - string
            - "null"
        senderActorId:
          type:
            - string
            - "null"
        replyToMessageId:
          type:
            - string
            - "null"
        kind:
          type: string
        content:
          type: string
        metadata:
          type:
            - object
            - "null"
        model:
          type:
            - string
            - "null"
        createdAt:
          type: string
        updatedAt:
          type:
            - string
            - "null"
    InsertMessageRequest:
      type: object
      required: [id, teamId, senderActorId, content]
      properties:
        id:
          type: string
        teamId:
          type: string
        senderActorId:
          type: string
        content:
          type: string
        kind:
          type: string
          default: text
        metadata:
          type:
            - object
            - "null"
        turnId:
          type:
            - string
            - "null"
        replyToMessageId:
          type:
            - string
            - "null"
        model:
          type:
            - string
            - "null"
        createdAt:
          type:
            - string
            - "null"
    ClaimInviteResult:
      type: object
      required: [actorId, teamId, actorType, displayName]
      properties:
        actorId:
          type: string
        teamId:
          type: string
        actorType:
          type: string
        displayName:
          type: string
        refreshToken:
          type:
            - string
            - "null"
    TeamWorkspaceConfig:
      type: object
      required: [teamId, defaultWorkspaceId]
      properties:
        teamId:
          type: string
        defaultWorkspaceId:
          type:
            - string
            - "null"
        pinnedWorkspaceIds:
          type: array
          items:
            type: string
        updatedAt:
          type:
            - string
            - "null"
    Workspace:
      type: object
      required: [id, teamId, name, archived, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        teamId:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type:
            - string
            - "null"
        archived:
          type: boolean
        metadata:
          type:
            - object
            - "null"
          additionalProperties: true
        createdAt:
          type:
            - string
            - "null"
          format: date-time
        updatedAt:
          type:
            - string
            - "null"
          format: date-time
    WorkspacePage:
      type: object
      required: [items, nextCursor]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Workspace"
        nextCursor:
          type:
            - string
            - "null"
    WorkspaceUpsert:
      type: object
      required: [teamId, name]
      properties:
        id:
          type: string
          format: uuid
        teamId:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type:
            - string
            - "null"
        archived:
          type: boolean
        metadata:
          type:
            - object
            - "null"
          additionalProperties: true
    Actor:
      type: object
      required: [id, teamId, kind, displayName]
      properties:
        id:
          type: string
          format: uuid
        teamId:
          type: string
          format: uuid
        kind:
          type: string
          enum: [agent, user, external]
        displayName:
          type: string
        avatarUrl:
          type:
            - string
            - "null"
        metadata:
          type:
            - object
            - "null"
          additionalProperties: true
    ActorPage:
      type: object
      required: [items, nextCursor]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Actor"
        nextCursor:
          type:
            - string
            - "null"
    ConnectedAgent:
      allOf:
        - $ref: "#/components/schemas/Actor"
        - type: object
          properties:
            deviceId:
              type:
                - string
                - "null"
            lastSeenAt:
              type:
                - string
                - "null"
              format: date-time
            agentType:
              type: string
    AgentProfilePatch:
      type: object
      properties:
        displayName:
          type: string
        avatarUrl:
          type:
            - string
            - "null"
        description:
          type:
            - string
            - "null"
    AgentDefaultsPatch:
      type: object
      properties:
        defaultAgentType:
          type: string
        supportedAgentTypes:
          type: array
          items:
            type: string
    AgentAccess:
      type: object
      required: [agentActorId, actorId, role]
      properties:
        agentActorId:
          type: string
          format: uuid
        actorId:
          type: string
          format: uuid
        role:
          type: string
    SessionCreate:
      type: object
      required: [teamId, title, mode]
      properties:
        id:
          type: string
          format: uuid
        teamId:
          type: string
          format: uuid
        title:
          type: string
        mode:
          type: string
          enum: [solo, collab, control]
        ideaId:
          type:
            - string
            - "null"
          format: uuid
        primaryAgentActorId:
