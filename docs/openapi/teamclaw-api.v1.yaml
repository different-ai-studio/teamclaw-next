openapi: 3.1.0
info:
  title: TeamClaw Cloud API
  version: 1.0.0
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
servers:
  - url: https://api.teamclaw.local
security:
  - bearerAuth: []
tags:
  - name: Teams
    description: Team membership and team metadata.
  - name: Sessions
    description: Conversation session list and detail surfaces.
  - name: Messages
    description: Session message read and write operations.
  - name: Invites
    description: Team invite claim operations.
  - name: Workspaces
    description: Workspace CRUD operations.
  - name: Actors
    description: Actor directory and agent access management.
  - name: Notifications
    description: Notification preferences and session mute management.
  - name: Shortcuts
    description: Shortcut management and visibility control.
  - name: Config
    description: Runtime configuration delivered to authenticated clients (MQTT broker, feature flags).
paths:
  /v1/auth/refresh:
    post:
      operationId: refreshAccessToken
      summary: Exchange a refresh token for a new access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        "200":
          description: New token pair
          content:
            application/json:
              schema:
                type: object
                required: [accessToken, refreshToken, expiresAt]
                properties:
                  accessToken:
                    type: string
                  refreshToken:
                    type: string
                  expiresAt:
                    type: integer
                    format: int64
        "401":
          $ref: "#/components/responses/Error"
  /v1/teams:
    get:
      operationId: listTeams
      summary: List teams
      tags: [Teams]
      responses:
        "200":
          description: Current user's teams.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                type: object
                required: [items, nextCursor]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Team"
                  nextCursor:
                    type:
                      - string
                      - "null"
        "401":
          $ref: "#/components/responses/Error"
    post:
      operationId: createTeam
      summary: Create team
      tags: [Teams]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  minLength: 1
                slug:
                  type:
                    - string
                    - "null"
      responses:
        "200":
          description: |
            Created team. Server-side this provisions a LiteLLM team + default
            key and seeds team_workspace_config in one call. When
            LITELLM_MASTER_KEY is unset on the FC side (local dev / tests),
            provisioning is skipped and `aiGatewayEndpoint` / `litellmKey` are
            `null` in the response.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Team"
                  - type: object
                    properties:
                      aiGatewayEndpoint:
                        description: LiteLLM-fronted OpenAI-compatible gateway base URL (e.g. `https://ai.ucar.cc/v1`). Null when provisioning was skipped.
                        type:
                          - string
                          - "null"
                      litellmKey:
                        description: One-shot default LiteLLM key for the new team. Returned only at creation time; store it locally on receipt. Null when provisioning was skipped.
                        type:
                          - string
                          - "null"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "502":
          description: LiteLLM provisioning failed; no DB rows were written.
          $ref: "#/components/responses/Error"
  /v1/teams/{teamId}:
    get:
      operationId: getTeam
      summary: Get team
      tags: [Teams]
      parameters:
        - $ref: "#/components/parameters/TeamId"
      responses:
        "200":
          description: Team.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"
        "404":
          $ref: "#/components/responses/Error"
    patch:
      operationId: renameTeam
      summary: Rename team
      tags: [Teams]
      parameters:
        - $ref: "#/components/parameters/TeamId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  minLength: 1
      responses:
        "200":
          description: Renamed team.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /v1/teams/{teamId}/invites:
    post:
      operationId: createTeamInvite
      summary: Create team invite
      tags: [Teams]
      parameters:
        - $ref: "#/components/parameters/TeamId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [actorType, displayName]
              properties:
                actorType:
                  type: string
                  enum: [agent, user, external]
                displayName:
                  type: string
                  minLength: 1
                role:
                  type: string
                expiresAt:
                  type:
                    - string
                    - "null"
                  format: date-time
      responses:
        "201":
          description: Created invite.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                type: object
                required: [token, inviteId, expiresAt]
                properties:
                  token:
                    type: string
                  inviteId:
                    type: string
                    format: uuid
                  expiresAt:
                    type:
                      - string
                      - "null"
                    format: date-time
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /v1/teams/{teamId}/members/{actorId}:
    delete:
      operationId: removeTeamActor
      summary: Remove team actor
      tags: [Teams]
      parameters:
        - $ref: "#/components/parameters/TeamId"
        - name: actorId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: OK
        "401":
          $ref: "#/components/responses/Error"
  /v1/sessions:
    get:
      operationId: listSessions
      summary: List sessions
      tags: [Sessions]
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Current actor sessions.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                type: object
                required: [items, nextCursor]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Session"
                  nextCursor:
                    type:
                      - string
                      - "null"
        "401":
          $ref: "#/components/responses/Error"
    post:
      operationId: createSession
      summary: Create session
      tags: [Sessions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionCreate"
      responses:
        "201":
          description: Created session with participants.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionWithParticipants"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /v1/sessions/{sessionId}:
    get:
      operationId: getSession
      summary: Get session with participants
      tags: [Sessions]
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Session with participants.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionWithParticipants"
        "404":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
    patch:
      operationId: patchSession
      summary: Update session
      tags: [Sessions]
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                mode:
                  type: string
                  enum: [solo, collab, control]
                ideaId:
                  type:
                    - string
                    - "null"
                  format: uuid
                archived:
                  type: boolean
      responses:
        "200":
          description: Updated session.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /v1/sessions/{sessionId}/mark-viewed:
    post:
      operationId: markSessionViewed
      summary: Mark session viewed
      tags: [Sessions]
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                lastReadMessageId:
                  type:
                    - string
                    - "null"
                  description: Pin the read marker to a specific message id. If omitted, the marker advances to the most recent message.
      responses:
        "204":
          description: OK
        "401":
          $ref: "#/components/responses/Error"
  /v1/sessions/{sessionId}/mark-unread:
    post:
      operationId: markSessionUnread
      summary: Mark session unread
      description: Deletes the calling actor's read marker so the session re-derives as unread.
      tags: [Sessions]
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "204":
          description: OK
        "401":
          $ref: "#/components/responses/Error"
  /v1/teams/{teamId}/sessions:
    get:
      operationId: listTeamSessions
      summary: List all sessions for a team with display-row fields populated
      description: |
        Returns the full SessionFull shape (summary, createdByActorId,
        primaryAgentId, participantCount) for every session in the team that
        the caller can see. Used by iOS to populate the session list without
        following up per-row participant queries.
      tags: [Sessions]
      parameters:
        - in: path
          name: teamId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Sessions for team.
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      required: [id, teamId, title, mode, hasUnread, participantCount]
                      properties:
                        id: { type: string }
                        teamId: { type: string }
                        title: { type: string }
                        mode: { type: string }
                        ideaId: { type: [string, "null"] }
                        primaryAgentId: { type: [string, "null"] }
                        createdByActorId: { type: [string, "null"] }
                        summary: { type: [string, "null"] }
                        lastMessageAt: { type: [string, "null"], format: date-time }
                        lastMessagePreview: { type: [string, "null"] }
                        participantCount: { type: integer }
                        hasUnread: { type: boolean }
                        createdAt: { type: [string, "null"], format: date-time }
                        updatedAt: { type: [string, "null"], format: date-time }
        "401":
          $ref: "#/components/responses/Error"
  /v1/teams/{teamId}/agent-runtimes:
    get:
      operationId: listTeamAgentRuntimes
      summary: List all agent runtimes for a team
      description: |
        Returns every row in `agent_runtimes` for the team that the caller
        can see. Used by iOS to merge backend runtime state into the local
        session list.
      tags: [Agents]
      parameters:
        - in: path
          name: teamId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Agent runtimes for team.
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      required: [id, teamId, agentId, backendType, status, createdAt, updatedAt]
                      properties:
                        id: { type: string }
                        teamId: { type: string }
                        agentId: { type: string }
                        sessionId: { type: [string, "null"] }
                        workspaceId: { type: [string, "null"] }
                        backendType: { type: string }
                        status: { type: string }
                        backendSessionId: { type: [string, "null"] }
                        runtimeId: { type: [string, "null"] }
                        currentModel: { type: [string, "null"] }
                        lastSeenAt: { type: [string, "null"], format: date-time }
                        createdAt: { type: string, format: date-time }
                        updatedAt: { type: string, format: date-time }
        "401":
          $ref: "#/components/responses/Error"
  /v1/sessions/{sessionId}/participants:
    get:
      operationId: listSessionParticipants
      summary: List session participants
      tags: [Sessions]
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Session participants.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionParticipantList"
        "401":
          $ref: "#/components/responses/Error"
    post:
      operationId: upsertSessionParticipant
      summary: Add or update session participant
      tags: [Sessions]
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [actorId]
              properties:
                actorId:
                  type: string
                  format: uuid
                role:
                  type: string
      responses:
        "200":
          description: Upserted participant.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionParticipant"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /v1/sessions/{sessionId}/participants/{actorId}:
    delete:
      operationId: removeSessionParticipant
      summary: Remove session participant
      tags: [Sessions]
      parameters:
        - $ref: "#/components/parameters/SessionId"
        - name: actorId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: OK
        "401":
          $ref: "#/components/responses/Error"
  /v1/sessions/by-acp/{acpSessionId}:
    get:
      operationId: getSessionByAcp
      summary: Get session by ACP session ID
      tags: [Sessions]
      parameters:
        - name: acpSessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session ACP binding.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                type: object
                required: [sessionId]
                properties:
                  sessionId:
                    type: string
                    format: uuid
                  gatewaySessionId:
                    type:
                      - string
                      - "null"
        "404":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /v1/sessions/gateway/ensure:
    post:
      operationId: ensureGatewaySession
      summary: Ensure gateway session
      tags: [Sessions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [teamId, binding, title, primaryAgentActorId]
              properties:
                teamId:
                  type: string
                  format: uuid
                binding:
                  type: string
                title:
                  type: string
                primaryAgentActorId:
                  type: string
                  format: uuid
                ownerMemberActorIds:
                  type: array
                  items:
                    type: string
                    format: uuid
                participantActorIds:
                  type: array
                  items:
                    type: string
                    format: uuid
      responses:
        "200":
          description: Gateway session result.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                type: object
                required: [sessionId, gatewaySessionId, created]
                properties:
                  sessionId:
                    type: string
                    format: uuid
                  gatewaySessionId:
                    type: string
                  created:
                    type: boolean
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /v1/sessions/cron:
    post:
      operationId: createCronSession
      summary: Create cron session
      tags: [Sessions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [teamId, primaryAgentActorId, title]
              properties:
                teamId:
                  type: string
                  format: uuid
                primaryAgentActorId:
                  type: string
                  format: uuid
                title:
                  type: string
      responses:
        "200":
          description: Cron session result.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                type: object
                required: [sessionId]
                properties:
                  sessionId:
                    type: string
                    format: uuid
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /v1/sessions/{sessionId}/messages:
    get:
      operationId: listMessages
      summary: List messages
      tags: [Messages]
      parameters:
        - $ref: "#/components/parameters/SessionId"
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Session messages.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                type: object
                required: [items, nextCursor]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Message"
                  nextCursor:
                    type:
                      - string
                      - "null"
        "401":
          $ref: "#/components/responses/Error"
    post:
      operationId: insertMessage
      summary: Insert message
      tags: [Messages]
      parameters:
        - $ref: "#/components/parameters/SessionId"
        - name: Idempotency-Key
          in: header
          schema:
            type: string
            minLength: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InsertMessageRequest"
      responses:
        "200":
          description: Inserted or replayed message.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "400":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
  /v1/messages/{messageId}:
    patch:
      operationId: patchMessage
      summary: Update message content or metadata
      tags: [Messages]
      parameters:
        - name: messageId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                content:
                  type: string
                metadata:
                  type:
                    - object
                    - "null"
                  additionalProperties: true
      responses:
        "200":
          description: Updated message.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
    delete:
      operationId: deleteMessage
      summary: Delete message
      tags: [Messages]
      parameters:
        - name: messageId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: OK
        "401":
          $ref: "#/components/responses/Error"
  /v1/invites/claim:
    post:
      operationId: claimInvite
      summary: Claim invite
      tags: [Invites]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
                  minLength: 1
      responses:
        "200":
          description: Claimed invite.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClaimInviteResult"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /v1/heartbeat:
    post:
      operationId: heartbeat
      summary: Daemon liveness ping (updates last_seen)
      responses:
        "204":
          description: OK
        "401":
          $ref: "#/components/responses/Error"
  /v1/presence/foreground:
    post:
      operationId: writeForegroundPresence
      summary: Report that a client device is in the foreground until a deadline
      description: |
        Upserts a `client_presence` row keyed by (user_id, device_id). The
        push dispatcher reads this row to suppress notifications while the
        device is in the foreground.
      tags: [System]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [deviceId, foregroundUntil]
              properties:
                deviceId:
                  type: string
                  description: Stable per-installation device identifier.
                foregroundUntil:
                  type: string
                  format: date-time
                  description: ISO 8601 timestamp until which the device should be treated as foreground.
      responses:
        "204":
          description: Presence recorded.
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /v1/config/bootstrap:
    get:
      operationId: getBootstrapConfig
      summary: Runtime configuration for authenticated clients (MQTT broker, feature flags, etc.)
      tags: [Config]
      responses:
        "200":
          description: Bootstrap configuration payload.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BootstrapConfig"
        "401":
          $ref: "#/components/responses/Error"
  /v1/workspaces:
    get:
      operationId: listWorkspaces
      summary: List workspaces by team
      tags: [Workspaces]
      parameters:
        - name: teamId
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Workspace page.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspacePage"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
    post:
      operationId: upsertWorkspace
      summary: Upsert workspace
      tags: [Workspaces]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkspaceUpsert"
      responses:
        "200":
          description: Upserted workspace.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
        "400":
          $ref: "#/components/responses/Error"
        "401":
