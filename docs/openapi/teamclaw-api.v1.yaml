                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        name: { type: [string, "null"] }
                        path: { type: [string, "null"] }
        "400":
          $ref: "#/components/responses/Error"
  /v1/teams/{teamId}/shortcut-role-bindings:
    get:
      operationId: listShortcutRoleBindings
      summary: List shortcut resource → role bindings for a team
      tags: [Shortcuts]
      parameters:
        - name: teamId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Role bindings
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        resource_id: { type: string }
                        permission_roles:
                          type: array
                          items:
                            type: object
                            properties:
                              role_id: { type: string }
        "400":
          $ref: "#/components/responses/Error"
  /v1/actors/by-ids:
    post:
      operationId: listActorDirectoryByIds
      summary: Look up actor directory entries by id list
      tags: [Actors]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [actorIds]
              properties:
                actorIds:
                  type: array
                  items: { type: string }
                teamId:
                  type: [string, "null"]
      responses:
        "200":
          description: Matching actor directory entries
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { type: object }
        "400":
          $ref: "#/components/responses/Error"
  /v1/actors/access/{accessId}:
    delete:
      operationId: removeAgentAccessById
      summary: Remove an agent_member_access row by id
      tags: [Actors]
      parameters:
        - name: accessId
          in: path
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Removed
        "401":
          $ref: "#/components/responses/Error"
  /v1/teams/{teamId}/actors/{actorId}:
    delete:
      operationId: removeTeamActorScoped
      summary: Remove team actor (teamId + actorId path)
      tags: [Teams]
      parameters:
        - $ref: "#/components/parameters/TeamId"
        - name: actorId
          in: path
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Removed
        "401":
          $ref: "#/components/responses/Error"
  /v1/teams/{teamId}/workspace-git-config:
    get:
      operationId: loadTeamWorkspaceGitConfig
      summary: Load team workspace git/AI gateway config
      tags: [Workspaces]
      parameters:
        - $ref: "#/components/parameters/TeamId"
      responses:
        "200":
          description: Config row or null
          content:
            application/json:
              schema:
                type: [object, "null"]
                properties:
                  team_id: { type: string }
                  workspace_path: { type: [string, "null"] }
                  git_url: { type: [string, "null"] }
                  git_branch: { type: [string, "null"] }
                  git_token: { type: [string, "null"] }
                  ai_gateway_endpoint: { type: [string, "null"] }
                  enabled: { type: boolean }
                  metadata: { type: [object, "null"] }
                  updated_at: { type: [string, "null"] }
    put:
      operationId: saveTeamWorkspaceGitConfig
      summary: Upsert team workspace git/AI gateway config
      tags: [Workspaces]
      parameters:
        - $ref: "#/components/parameters/TeamId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                workspace_path: { type: [string, "null"] }
                git_url: { type: [string, "null"] }
                git_branch: { type: [string, "null"] }
                git_token: { type: [string, "null"] }
                ai_gateway_endpoint: { type: [string, "null"] }
                enabled: { type: boolean }
                metadata: { type: [object, "null"] }
      responses:
        "204":
          description: Saved
        "400":
          $ref: "#/components/responses/Error"
  /v1/auth/signin-anonymous:
    post:
      operationId: signInAnonymous
      summary: Proxy to Supabase GoTrue anonymous signup
      tags: [Auth]
      security: []
      responses:
        "200":
          description: GoTrue session payload
          content:
            application/json:
              schema: { type: object }
        "422":
          $ref: "#/components/responses/Error"
  /v1/auth/signin-otp:
    post:
      operationId: signInOtp
      summary: Proxy to Supabase GoTrue /auth/v1/otp (email or SMS OTP)
      description: >
        Provide either `email` or `phone` (E.164, e.g. +8613800138000). For
        phone, an SMS code is sent; pass `options.channel` to override the
        default "sms" delivery channel.
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Exactly one of email or phone must be provided.
              properties:
                email: { type: string, format: email }
                phone: { type: string, description: "E.164 phone, e.g. +8613800138000" }
                options: { type: object }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: object }
        "400":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"
  /v1/auth/verify-otp:
    post:
      operationId: verifyOtp
      summary: Proxy to Supabase GoTrue /auth/v1/verify
      description: >
        Provide either `email` or `phone` (matching the signin-otp request)
        plus `token`. `type` defaults to "email"; phone verification uses "sms".
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              description: Exactly one of email or phone must be provided.
              properties:
                email: { type: string, format: email }
                phone: { type: string, description: "E.164 phone, e.g. +8613800138000" }
                token: { type: string }
                type: { type: string, default: email, enum: [email, sms, signup, email_change, phone_change, recovery] }
      responses:
        "200":
          description: GoTrue session payload
          content:
            application/json:
              schema: { type: object }
        "400":
          $ref: "#/components/responses/Error"
  /v1/auth/signout:
    post:
      operationId: signOut
      summary: Proxy to Supabase GoTrue /auth/v1/logout
      tags: [Auth]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: object }
        "401":
          $ref: "#/components/responses/Error"
  /v1/auth/user:
    patch:
      operationId: updateAuthUser
      summary: Proxy to Supabase GoTrue PUT /auth/v1/user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema: { type: object }
        "401":
          $ref: "#/components/responses/Error"
  /v1/auth/signin-idtoken:
    post:
      operationId: signInWithIdToken
      summary: Native OIDC sign-in / identity link (Apple, Google) via GoTrue id_token grant
      description: |
        Exchanges a provider ID token for a Supabase session. When called with
        a Bearer access token, GoTrue links the OIDC identity to the current
        user instead of minting a new one — powering the anonymous → Apple
        upgrade flow.
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [provider, idToken]
              properties:
                provider:
                  type: string
                  enum: [apple, google]
                idToken:
                  type: string
                nonce:
                  type: [string, "null"]
      responses:
        "200":
          description: GoTrue session
          content:
            application/json:
              schema: { type: object }
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /v1/auth/signin-password:
    post:
      operationId: signInWithPassword
      summary: Proxy to Supabase GoTrue password grant
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        "200":
          description: GoTrue session payload
          content:
            application/json:
              schema: { type: object }
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /v1/auth/signup:
    post:
      operationId: signUp
      summary: Proxy to Supabase GoTrue /signup with email + password
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        "200":
          description: GoTrue session payload (or confirmation pending)
          content:
            application/json:
              schema: { type: object }
        "400":
          $ref: "#/components/responses/Error"
  "/v1/auth/oauth/{provider}/authorize":
    get:
      operationId: oauthAuthorize
      summary: Stateless PKCE OAuth authorize redirect
      description: |
        Builds a GoTrue authorize URL for the given provider and returns a 302
        redirect. The client supplies its own PKCE `code_challenge`; FC holds no
        state. GoTrue redirects to `redirect` (app scheme URL) with a single-use
        authorization code.
      tags: [Auth]
      security: []
      parameters:
        - name: provider
          in: path
          required: true
          schema: { type: string, example: google }
        - name: redirect
          in: query
          required: true
          schema: { type: string, example: "teamclaw://auth-callback" }
        - name: code_challenge
          in: query
          required: true
          schema: { type: string }
      responses:
        "302":
          description: Redirect to GoTrue authorize URL
          headers:
            Location:
              schema: { type: string }
        "400":
          $ref: "#/components/responses/Error"
  /v1/auth/oauth/exchange:
    post:
      operationId: oauthExchangePkce
      summary: Exchange PKCE authorization code for session tokens
      description: |
        Forwards `{ auth_code, code_verifier }` to GoTrue's
        `POST /auth/v1/token?grant_type=pkce` and returns the session payload.
        FC holds no state — the client supplies the `codeVerifier` it generated
        before the authorize redirect.
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, codeVerifier]
              properties:
                code: { type: string }
                codeVerifier: { type: string }
      responses:
        "200":
          description: GoTrue session payload
          content:
            application/json:
              schema: { type: object }
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /v1/me/bootstrap:
    get:
      operationId: getMeBootstrap
      summary: Member actor + team memberships for the authenticated user
      description: |
        Returns the caller's member-actor id, the teams they belong to, and a
        per-team member-actor map. Backs the iOS onboarding bootstrap that
        previously read actors + team_members directly from Supabase.
      tags: [Config]
      responses:
        "200":
          description: Bootstrap payload.
          content:
            application/json:
              schema:
                type: object
                required: [memberActorId, teams, memberActorIdByTeam]
                properties:
                  memberActorId:
                    type: [string, "null"]
                  teams:
                    type: array
                    items:
                      type: object
                      required: [id, name, role]
                      properties:
                        id: { type: string }
                        name: { type: string }
                        slug: { type: [string, "null"] }
                        role: { type: string }
                  memberActorIdByTeam:
                    type: object
                    additionalProperties: { type: string }
        "401":
          $ref: "#/components/responses/Error"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  headers:
    RequestId:
      schema:
        type: string
  parameters:
    TeamId:
      name: teamId
      in: path
      required: true
      schema:
        type: string
    SessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
  responses:
    NotFound:
      description: Resource not found.
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Error:
      description: Error response.
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
  schemas:
    BootstrapConfig:
      type: object
      description: Runtime configuration delivered to authenticated clients on startup. Fields are optional; clients fall back to local defaults when omitted.
      properties:
        mqtt:
          $ref: "#/components/schemas/BootstrapMqttConfig"
      additionalProperties: true
    BootstrapMqttConfig:
      type: object
      required: [url]
      properties:
        url:
          type: string
          description: Full broker URL including scheme (mqtt://, mqtts://, ws://, wss://) and port.
        username:
          type:
            - string
            - "null"
        password:
          type:
            - string
            - "null"
        useTls:
          type:
            - boolean
            - "null"
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, requestId]
          properties:
            code:
              type: string
              enum:
                - missing_auth
                - invalid_json
                - validation_failed
                - forbidden
                - not_found
                - conflict
                - rate_limited
                - upstream_unavailable
                - internal
            message:
              type: string
            requestId:
              type: string
    Team:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type:
            - string
            - "null"
        createdAt:
          type:
            - string
            - "null"
    Session:
      type: object
      required: [id, teamId, title, mode, hasUnread]
      properties:
        id:
          type: string
        teamId:
          type: string
        title:
          type: string
        mode:
          type: string
          enum: [solo, collab, control]
        ideaId:
          type:
            - string
            - "null"
        lastMessageAt:
          type:
            - string
            - "null"
        lastMessagePreview:
          type:
            - string
            - "null"
        hasUnread:
          type: boolean
        createdAt:
          type:
            - string
            - "null"
        updatedAt:
          type:
            - string
            - "null"
    Message:
      type: object
      required: [id, teamId, sessionId, kind, content, createdAt]
      properties:
        id:
          type: string
        teamId:
          type: string
        sessionId:
          type: string
        turnId:
          type:
            - string
            - "null"
        senderActorId:
          type:
            - string
            - "null"
        replyToMessageId:
          type:
            - string
            - "null"
        kind:
          type: string
        content:
          type: string
        metadata:
          type:
            - object
            - "null"
        model:
          type:
            - string
            - "null"
        createdAt:
          type: string
        updatedAt:
          type:
            - string
            - "null"
    InsertMessageRequest:
      type: object
      required: [id, teamId, senderActorId, content]
      properties:
        id:
          type: string
        teamId:
          type: string
        senderActorId:
          type: string
        content:
          type: string
        kind:
          type: string
          default: text
        metadata:
          type:
            - object
            - "null"
        turnId:
          type:
            - string
            - "null"
        replyToMessageId:
          type:
            - string
            - "null"
        model:
          type:
            - string
            - "null"
        createdAt:
          type:
            - string
            - "null"
    ClaimInviteResult:
      type: object
      required: [actorId, teamId, actorType, displayName]
      properties:
        actorId:
          type: string
        teamId:
          type: string
        actorType:
          type: string
        displayName:
          type: string
        refreshToken:
          type:
            - string
            - "null"
    TeamWorkspaceConfig:
      type: object
      required: [teamId, defaultWorkspaceId]
      properties:
        teamId:
          type: string
        defaultWorkspaceId:
          type:
            - string
            - "null"
        pinnedWorkspaceIds:
          type: array
          items:
            type: string
        updatedAt:
          type:
            - string
            - "null"
    TeamShareMode:
      type: string
      enum: [oss, managed_git, custom_git]
      description: |
        Team share mode. `oss` uses Alibaba OSS / WebDAV; `managed_git` uses a
        TeamClaw-provisioned git remote; `custom_git` uses a caller-supplied
        git remote with explicit credential metadata.
    EnableShareModeRequest:
      type: object
      required: [mode]
      properties:
        mode:
          $ref: "#/components/schemas/TeamShareMode"
        gitConfig:
          type: object
          description: |
            Required when `mode` is `managed_git` or `custom_git`. For
            `custom_git`, `authKind` and `credentialRef` are also required.
            `credentialRef` references a device-local secret entry; the FC
            never sees the raw credential material.
          required: [remoteUrl]
          properties:
            remoteUrl:
              type: string
            authKind:
              type: string
              enum: [ssh_key, https_token]
            credentialRef:
              type: string
    ShareStatus:
      type: object
      required: [mode, enabledAt, gitRemoteUrl, gitAuthKind]
      properties:
        mode:
          oneOf:
            - $ref: "#/components/schemas/TeamShareMode"
            - type: "null"
        enabledAt:
          type:
            - string
            - "null"
          format: date-time
        gitRemoteUrl:
          type:
            - string
            - "null"
        gitAuthKind:
          type:
            - string
            - "null"
          enum: [ssh_key, https_token, null]
    MergedWorkspaceConfig:
      type: object
      required: [shareMode, gitRemoteUrl, gitAuthKind, syncMode, litellmTeamId]
      properties:
        shareMode:
          oneOf:
            - $ref: "#/components/schemas/TeamShareMode"
            - type: "null"
        gitRemoteUrl:
          type:
            - string
            - "null"
        gitAuthKind:
          type:
            - string
            - "null"
          enum: [ssh_key, https_token, null]
        syncMode:
          type:
            - string
            - "null"
        litellmTeamId:
          type:
            - string
            - "null"
    LiteLlmSetupResponse:
      type: object
      required: [aiGatewayEndpoint, litellmKey]
      properties:
        aiGatewayEndpoint:
          type: string
        litellmKey:
          type: string
    Workspace:
      type: object
      required: [id, teamId, name, archived, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        teamId:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type:
            - string
            - "null"
        archived:
          type: boolean
        metadata:
          type:
            - object
            - "null"
          additionalProperties: true
        createdAt:
          type:
            - string
            - "null"
          format: date-time
        updatedAt:
          type:
            - string
            - "null"
          format: date-time
    WorkspacePage:
      type: object
      required: [items, nextCursor]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Workspace"
        nextCursor:
          type:
            - string
            - "null"
    WorkspaceUpsert:
      type: object
      required: [teamId, name]
      properties:
        id:
          type: string
          format: uuid
        teamId:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type:
            - string
            - "null"
        archived:
          type: boolean
        metadata:
          type:
            - object
            - "null"
          additionalProperties: true
    Actor:
      type: object
      required: [id, teamId, kind, displayName]
      properties:
        id:
          type: string
          format: uuid
        teamId:
          type: string
          format: uuid
        kind:
          type: string
          enum: [agent, user, external]
        displayName:
          type: string
        avatarUrl:
          type:
            - string
            - "null"
        teamRole:
          description: Member's role in the team. Null for agents/external.
          type:
            - string
            - "null"
          enum: [owner, admin, member, null]
        visibility:
          description: Agent visibility scope. Null for members/external.
          type:
            - string
            - "null"
          enum: [team, personal, null]
        email:
          description: >-
            Member's account email. Null for agents/external and for anonymous
            members. Only returned to fellow team members.
          type:
            - string
            - "null"
        phone:
          description: >-
            Member's account phone number. Null for agents/external and for
            members who signed up without a phone. Only returned to fellow team
            members.
          type:
            - string
            - "null"
        metadata:
          type:
            - object
            - "null"
          additionalProperties: true
        clientVersions:
          description: >-
            Latest reported client version per device, for ops/support
            debugging. Empty when nothing has been reported.
          type: array
          items:
            type: object
            required: [clientType, version, deviceId, lastReportedAt]
            properties:
              clientType:
                type: string
                enum: [tauri, ios, expo, daemon]
              version:
                type: string
              deviceId:
                type: string
              build:
                type:
                  - string
                  - "null"
              lastReportedAt:
                type: string
                format: date-time
    ActorPage:
      type: object
      required: [items, nextCursor]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Actor"
        nextCursor:
          type:
            - string
            - "null"
    ConnectedAgent:
      allOf:
        - $ref: "#/components/schemas/Actor"
        - type: object
          properties:
            lastSeenAt:
              type:
                - string
                - "null"
              format: date-time
            agentType:
              type: string
    MemberDefaultAgent:
      type: object
      required: [defaultAgentId]
      properties:
        defaultAgentId:
          description: The member's default agent actor id, or null if unset.
          type:
            - string
            - "null"
          format: uuid
    SetMemberDefaultAgentRequest:
      type: object
      required: [agentId]
      properties:
        agentId:
          description: Agent actor id to set as default, or null to clear it.
          type:
            - string
            - "null"
          format: uuid
    AgentProfilePatch:
      type: object
      properties:
        displayName:
          type: string
        avatarUrl:
          type:
            - string
            - "null"
        description:
          type:
            - string
            - "null"
    AgentDefaultsPatch:
      type: object
      properties:
        defaultAgentType:
          type: string
        supportedAgentTypes:
          type: array
          items:
            type: string
    AgentAccess:
      type: object
      required: [agentActorId, actorId, role]
      properties:
        agentActorId:
          type: string
          format: uuid
        actorId:
          type: string
          format: uuid
        role:
          type: string
    SessionCreate:
      type: object
      required: [teamId, title, mode]
      properties:
        id:
          type: string
          format: uuid
        teamId:
          type: string
          format: uuid
        title:
          type: string
        mode:
          type: string
          enum: [solo, collab, control]
        ideaId:
