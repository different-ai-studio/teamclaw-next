      tags: [Workspaces]
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Workspace.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
        "404":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
    patch:
      operationId: patchWorkspace
      summary: Update workspace name, archived status, path, or bound agent
      tags: [Workspaces]
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                archived:
                  type: boolean
                path:
                  type:
                    - string
                    - "null"
                agentId:
                  type:
                    - string
                    - "null"
                  description: Bind (uuid) or unbind (null) the agent that owns this workspace.
                metadata:
                  type: object
                  additionalProperties: true
      responses:
        "200":
          description: Updated workspace.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /v1/teams/{teamId}/workspace-defaults:
    get:
      operationId: getTeamWorkspaceDefaults
      summary: Get team workspace defaults (legacy default + pinned workspace list)
      description: |
        Returns the legacy team workspace defaults shape:
        `{ defaultWorkspaceId, pinnedWorkspaceIds, updatedAt }`.
        Distinct from `GET /v1/teams/{teamId}/workspace-config`, which returns
        the merged share-mode + litellm shape introduced in the team-share
        onboarding refactor.
      tags: [Teams]
      parameters:
        - $ref: "#/components/parameters/TeamId"
      responses:
        "200":
          description: Team workspace defaults.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamWorkspaceConfig"
        "404":
          $ref: "#/components/responses/Error"
  /v1/teams/{teamId}/workspace-config:
    get:
      operationId: getTeamWorkspaceConfig
      summary: Get merged team workspace config (share mode + litellm)
      description: |
        Returns the merged team workspace config introduced in the team-share
        onboarding refactor: share mode, git remote/auth (when applicable),
        sync mode, and the provisioned LiteLLM team id. The legacy default
        workspace shape now lives at `GET /v1/teams/{teamId}/workspace-defaults`.
      tags: [Teams]
      parameters:
        - $ref: "#/components/parameters/TeamId"
      responses:
        "200":
          description: Merged team workspace config.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MergedWorkspaceConfig"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    put:
      operationId: putTeamWorkspaceConfig
      summary: Put team workspace config (legacy defaults shape)
      description: |
        Upserts the legacy team workspace defaults shape
        (`defaultWorkspaceId`, `pinnedWorkspaceIds`). Does not modify
        share-mode or litellm fields — those are managed via the
        `/share-mode` and `/litellm/setup` endpoints.
      tags: [Teams]
      parameters:
        - $ref: "#/components/parameters/TeamId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamWorkspaceConfig"
      responses:
        "200":
          description: Upserted team workspace config.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamWorkspaceConfig"
        "400":
          $ref: "#/components/responses/Error"
  /v1/teams/{teamId}/share-mode:
    post:
      operationId: enableTeamShareMode
      summary: Enable team share mode (one-shot lock)
      description: |
        Atomically locks the team's share mode to one of `oss`, `managed_git`,
        or `custom_git`. Once locked, the mode cannot be changed — a second
        call returns 409 `share_mode_locked`. For `managed_git` and
        `custom_git`, a `gitConfig.remoteUrl` is required. For `custom_git`,
        the caller must also supply `gitConfig.authKind` and
        `gitConfig.credentialRef`.
      tags: [Teams]
      parameters:
        - $ref: "#/components/parameters/TeamId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnableShareModeRequest"
      responses:
        "200":
          description: Team after share mode is enabled.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
    get:
      operationId: getTeamShareMode
      summary: Get team share mode status
      tags: [Teams]
      parameters:
        - $ref: "#/components/parameters/TeamId"
      responses:
        "200":
          description: Current team share status. `mode` is null when share has not been opened.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShareStatus"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    delete:
      operationId: disableTeamShareMode
      summary: Disable team share (owner reset)
      description: |
        Clears the team's locked share mode and git binding fields so the
        owner can run the share onboarding flow again (`mode` returns to null).
        Does not delete the team or its members. Local clients should also
        remove workspace symlinks and daemon global directories before or
        after calling this endpoint.
      tags: [Teams]
      parameters:
        - $ref: "#/components/parameters/TeamId"
      responses:
        "200":
          description: Share status after reset (mode is null).
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShareStatus"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /v1/teams/{teamId}/litellm/setup:
    post:
      operationId: setupTeamLiteLlm
      summary: Provision LiteLLM team for AI gateway
      description: |
        Provisions a LiteLLM team for the given TeamClaw team and persists
        the resulting `litellm_team_id` and `ai_gateway_endpoint` on the team
        workspace config. Returns the `aiGatewayEndpoint` and the freshly
        minted `litellmKey` (the caller is responsible for storing the key
        securely on the device). Returns 503 `litellm_unavailable` when the
        FC environment is not configured to talk to LiteLLM.
      tags: [Teams]
      parameters:
        - $ref: "#/components/parameters/TeamId"
      responses:
        "200":
          description: LiteLLM provisioning result.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiteLlmSetupResponse"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
