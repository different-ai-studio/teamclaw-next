name: oss-sync-e2e
on:
  workflow_dispatch:
    inputs:
      three_node:
        description: "Run optional three-node scenario"
        type: boolean
        default: false
jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: apps/daemon/e2e/oss-sync
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Write .env.local
        run: |
          cat > .env.local <<EOF
          TEST_EMAIL=${{ secrets.OSS_E2E_TEST_EMAIL }}
          TEST_PASSWORD=${{ secrets.OSS_E2E_TEST_PASSWORD }}
          CLOUD_API_URL=${{ vars.OSS_E2E_CLOUD_API_URL || 'https://cloud.ucar.cc' }}
          RUN_THREE_NODE=${{ inputs.three_node && '1' || '0' }}
          EOF
      - name: Build amuxd image
        run: docker compose build node-a
      - name: Unit helpers
        run: node --test tests/unit-*.test.mjs
      # Scenarios are parallel-safe (each test file gets its own compose project +
      # ephemeral ports), but this job targets the shared, aggressively
      # rate-limited prod FC, so cap concurrency at 1 for reliability. The glob
      # covers all lightweight scenarios; heavy ones (10/11/12/13/16) self-skip
      # unless RUN_HEAVY / RUN_THREE_NODE is set.
      - name: E2E scenarios
        run: node --env-file=.env.local --test-concurrency=1 --test 'tests/[0-9][0-9]-*.test.mjs'
