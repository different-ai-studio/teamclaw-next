name: Sentry Daily Digest

# Pushes a once-a-day Sentry error summary to WeCom instead of waiting for a
# user to report a 500. Reports the top unresolved issues by frequency over the
# last 24h across the org's projects (frontend / desktop / iOS all live under
# Sentry org o60909).
#
# Requires two repo settings before it does anything useful (otherwise it logs a
# warning and exits 0 — it never red-fails on missing config):
#   - secret  SENTRY_AUTH_TOKEN : a Sentry internal/auth token with org:read + event:read
#   - variable SENTRY_ORG       : the org slug (the human slug, NOT the numeric o60909)
# Optional:
#   - variable SENTRY_API_URL   : defaults to https://us.sentry.io (US data region)

on:
  schedule:
    - cron: "0 1 * * *" # 01:00 UTC daily = 09:00 Asia/Shanghai
  workflow_dispatch:

concurrency:
  group: sentry-daily
  cancel-in-progress: true

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Build and send digest
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_API_URL: ${{ vars.SENTRY_API_URL || 'https://us.sentry.io' }}
          WECOM_WEBHOOK_KEY: ${{ secrets.WECOM_WEBHOOK_KEY }}
        run: |
          set -uo pipefail

          if [ -z "${SENTRY_AUTH_TOKEN:-}" ] || [ -z "${SENTRY_ORG:-}" ]; then
            echo "::warning::SENTRY_AUTH_TOKEN secret or SENTRY_ORG variable not set — skipping digest."
            echo "Set them under Settings → Secrets/Variables → Actions to enable the Sentry daily report."
            exit 0
          fi

          api="${SENTRY_API_URL}/api/0/organizations/${SENTRY_ORG}/issues/"
          # Top 10 unresolved issues seen in the last 24h, by frequency.
          resp=$(curl -s -m 30 -G "$api" \
            -H "Authorization: Bearer $SENTRY_AUTH_TOKEN" \
            --data-urlencode "query=is:unresolved" \
            --data-urlencode "statsPeriod=24h" \
            --data-urlencode "sort=freq" \
            --data-urlencode "limit=10")

          if ! echo "$resp" | jq -e 'type == "array"' >/dev/null 2>&1; then
            echo "::error::Unexpected Sentry API response:"
            echo "$resp" | head -c 500
            # Surface the failure to WeCom so a broken token/slug is visible.
            content=$(printf '## ⚠️ Sentry 日报拉取失败\n> 组织: `%s`\n> 接口返回非预期，请检查 SENTRY_AUTH_TOKEN / SENTRY_ORG。' "$SENTRY_ORG")
            jq -nc --arg content "$content" '{msgtype:"markdown",markdown:{content:$content}}' \
              | curl -s -X POST "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=$WECOM_WEBHOOK_KEY" \
                  -H 'Content-Type: application/json' --data-binary @- >/dev/null
            exit 1
          fi

          total=$(echo "$resp" | jq 'length')
          today=$(date -u '+%Y-%m-%d')

          if [ "$total" -eq 0 ]; then
            body=$(printf '## 🟢 Sentry 日报 · %s\n> 最近 24h 无未解决问题 🎉' "$today")
          else
            lines=$(echo "$resp" | jq -r '
              .[:8][] |
              "> • [\(.count // "?")×] [\(.title | gsub("\n";" ") | .[0:80])](\(.permalink))" +
              (if .project.slug then "  `\(.project.slug)`" else "" end)
            ')
            body=$(printf '## 🟠 Sentry 日报 · %s\n> 最近 24h 未解决问题 Top %s（按频次）：\n%s\n> [打开 Sentry](%s/organizations/%s/issues/)' \
              "$today" "$total" "$lines" "$SENTRY_API_URL" "$SENTRY_ORG")
          fi

          jq -nc --arg content "$body" '{msgtype:"markdown",markdown:{content:$content}}' \
            | curl -s -X POST "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=$WECOM_WEBHOOK_KEY" \
                -H 'Content-Type: application/json' --data-binary @- >/dev/null
          echo "Sent digest: $total issue(s)."
