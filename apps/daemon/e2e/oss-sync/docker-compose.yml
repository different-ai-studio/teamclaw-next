# Default project name for manual `docker compose` use. The harness overrides
# it with a unique per-process `-p` so parallel scenarios stay isolated.
name: amuxd-oss-e2e
services:
  node-a:
    build:
      context: ../../../..        # 仓库根
      dockerfile: apps/daemon/e2e/oss-sync/Dockerfile.amuxd
    image: amuxd-oss-e2e:latest
    environment:
      TEAMCLAW_CLOUD_API_URL: ${CLOUD_API_URL:-https://cloud.ucar.cc}
    # Ephemeral loopback host port (container 8787). The harness discovers the
    # actual port via `docker compose port`, so concurrent scenarios never
    # collide on a fixed host port.
    ports:
      - "127.0.0.1::8787"
    command: ["sleep", "infinity"]
  node-b:
    image: amuxd-oss-e2e:latest      # 复用 node-a 构建的镜像
    environment:
      TEAMCLAW_CLOUD_API_URL: ${CLOUD_API_URL:-https://cloud.ucar.cc}
    ports:
      - "127.0.0.1::8787"
    command: ["sleep", "infinity"]
    depends_on: [node-a]
  node-c:
    image: amuxd-oss-e2e:latest
    environment:
      TEAMCLAW_CLOUD_API_URL: ${CLOUD_API_URL:-https://cloud.ucar.cc}
    ports:
      - "127.0.0.1::8787"
    command: ["sleep", "infinity"]
    depends_on: [node-a]
    profiles: ["three-node"]
