// Local NATS test config: JetStream + WebSocket enabled.
// Launch: nats-server -c apps/daemon/tests/fixtures/nats-test.conf
//
// Connection endpoints:
//   - NATS protocol:    nats://127.0.0.1:14222
//   - WebSocket plain:  ws://127.0.0.1:18080
//   - HTTP monitoring:  http://127.0.0.1:18222

port: 14222
http_port: 18222
server_name: amuxd-test

jetstream {
    store_dir: "/tmp/amuxd-nats-jetstream"
    max_memory_store: 64MB
    max_file_store: 256MB
}

websocket {
    port: 18080
    no_tls: true
}
